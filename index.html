<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Mandado Semanal</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f7f2;--surface:#fff;--green:#1e7a46;--green-mid:#2a9d5c;
  --green-light:#e6f5ec;--green-xlight:#f0faf4;--red:#e03e2d;--red-light:#fdecea;
  --ink:#12261a;--ink-soft:#4a6657;--line:#ddeee5;--yellow:#f5a623;
  --yellow-light:#fff8ec;--shadow-sm:0 1px 4px rgba(18,38,26,.08);
  --shadow-md:0 4px 20px rgba(18,38,26,.12);--shadow-lg:0 12px 48px rgba(18,38,26,.18);
  --radius:14px;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:80px}

/* TOPBAR */
.topbar{background:var(--green);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(18,38,26,.25)}
.title-wrap{position:relative}
.title-btn{background:rgba(255,255,255,.15);border:none;border-radius:10px;padding:7px 13px;color:#fff;font-family:'Playfair Display',serif;font-size:17px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .2s}
.title-btn:hover{background:rgba(255,255,255,.25)}
.chevron{font-size:10px;opacity:.7;transition:transform .2s;font-family:'Nunito',sans-serif}
.title-btn.open .chevron{transform:rotate(180deg)}
.dropdown{position:absolute;top:calc(100% + 8px);left:0;min-width:210px;background:var(--surface);border-radius:13px;box-shadow:var(--shadow-lg);overflow:hidden;z-index:300;opacity:0;transform:translateY(-6px) scale(.97);pointer-events:none;transition:all .18s ease}
.dropdown.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
.dd-item{display:flex;align-items:center;gap:10px;padding:13px 16px;font-size:14px;font-weight:700;color:var(--ink);cursor:pointer;transition:background .15s;border-bottom:1px solid var(--line)}
.dd-item:last-child{border-bottom:none}
.dd-item:hover{background:var(--green-xlight);color:var(--green)}
.dd-icon{font-size:18px;width:24px;text-align:center}
.cart-btn{position:relative;background:rgba(255,255,255,.18);border:none;border-radius:12px;padding:8px 14px 8px 10px;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s}
.cart-btn:hover{background:rgba(255,255,255,.28)}
.cart-badge{position:absolute;top:-6px;right:-6px;background:var(--yellow);color:var(--ink);font-size:10px;font-weight:900;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.cart-badge.bump{transform:scale(1.4)}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--line);position:sticky;top:52px;z-index:100}
.tab{flex:1;padding:13px 8px;font-weight:700;font-size:13px;text-align:center;cursor:pointer;color:var(--ink-soft);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;user-select:none}
.tab.active{color:var(--green);border-color:var(--green)}
.tab:hover:not(.active){background:var(--green-xlight)}

/* VIEWS */
.view{display:none;padding:18px 15px}
.view.active{display:block;animation:slideIn .22s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:16px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-pill{white-space:nowrap;padding:6px 13px;border-radius:20px;border:2px solid var(--line);background:var(--surface);font-size:12px;font-weight:700;cursor:pointer;color:var(--ink-soft);transition:all .15s;flex-shrink:0}
.filter-pill.active,.filter-pill:hover{background:var(--green);border-color:var(--green);color:#fff}

/* CATALOG GRID */
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
.product-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:13px 11px 11px;display:flex;flex-direction:column;gap:7px;transition:box-shadow .2s,transform .15s;position:relative;overflow:hidden}
.product-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.product-card.in-cart::after{content:'';position:absolute;inset:0;border-radius:var(--radius);border:2.5px solid var(--green);pointer-events:none}
.p-emoji{font-size:28px;text-align:center;line-height:1}
.p-name{font-size:13px;font-weight:800;text-align:center;line-height:1.2}
.p-unit{font-size:11px;color:var(--ink-soft);text-align:center;font-weight:500}
.p-price{font-size:15px;font-weight:900;color:var(--green);text-align:center}
.p-cat-badge{position:absolute;top:8px;left:8px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:2px 6px;border-radius:5px}
.qty-row{display:flex;align-items:center;justify-content:center;background:var(--green-light);border-radius:10px;overflow:hidden}
.qty-btn{background:none;border:none;width:30px;height:30px;font-size:17px;font-weight:900;cursor:pointer;color:var(--green);transition:background .15s;display:flex;align-items:center;justify-content:center}
.qty-btn:hover{background:rgba(30,122,70,.15)}
.qty-num{font-size:14px;font-weight:900;min-width:26px;text-align:center}
.add-btn{width:100%;padding:7px 0;border-radius:10px;border:none;background:var(--green);color:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:background .15s,transform .1s}
.add-btn:hover{background:var(--green-mid)}
.add-btn:active{transform:scale(.97)}
.add-btn.remove{background:var(--red-light);color:var(--red)}
.add-btn.remove:hover{background:#fad5d1}

/* CART */
.cart-empty{text-align:center;padding:60px 20px;color:var(--ink-soft)}
.cart-empty .emoji{font-size:52px;margin-bottom:12px}
.cart-empty p{font-size:14px;font-weight:600;line-height:1.6}
.cart-items{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.cart-item{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:11px;padding:12px 13px;animation:slideIn .2s ease}
.ci-emoji{font-size:24px;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:14px;font-weight:800}
.ci-unit{font-size:11px;color:var(--ink-soft)}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.ci-total{font-size:15px;font-weight:900;color:var(--green)}
.ci-qty-row{display:flex;align-items:center;background:var(--green-light);border-radius:8px;overflow:hidden}
.ci-qty-btn{background:none;border:none;width:26px;height:26px;font-size:15px;font-weight:900;cursor:pointer;color:var(--green);display:flex;align-items:center;justify-content:center;transition:background .15s}
.ci-qty-btn:hover{background:rgba(30,122,70,.15)}
.ci-qty-num{font-size:13px;font-weight:900;min-width:22px;text-align:center}
.ci-remove{background:none;border:none;font-size:15px;cursor:pointer;color:#ccc;transition:color .15s;padding:2px;margin-left:2px}
.ci-remove:hover{color:var(--red)}
.transport-row-cart{background:var(--yellow-light);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm)}
.transport-row-cart .t-info{flex:1}
.transport-row-cart .t-name{font-size:14px;font-weight:800}
.transport-row-cart .t-sub{font-size:11px;color:var(--ink-soft)}
.transport-row-cart .t-price{font-size:16px;font-weight:900;color:var(--yellow)}
.summary-card{background:var(--green);border-radius:16px;padding:22px 20px;box-shadow:var(--shadow-lg);margin-top:12px}
.summary-rows{display:flex;flex-direction:column;gap:8px}
.sum-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:rgba(255,255,255,.75);font-weight:600}
.sum-row.grand{border-top:1px solid rgba(255,255,255,.2);padding-top:12px;margin-top:4px}
.sum-row.grand .sum-label{font-size:15px;font-weight:800;color:#fff}
.sum-row.grand .sum-val{font-size:24px;font-weight:900;color:#fff}
.sum-val{font-weight:800;color:#fff;font-variant-numeric:tabular-nums}
.clear-btn{width:100%;margin-top:14px;padding:11px;border-radius:10px;border:2px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s}
.clear-btn:hover{background:rgba(255,255,255,.12)}
.wa-btn{width:100%;margin-top:10px;padding:14px;border-radius:12px;border:none;background:#25D366;color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .2s,transform .1s;box-shadow:0 4px 16px rgba(37,211,102,.35)}
.wa-btn:hover{background:#1ebe5a}
.wa-btn:active{transform:scale(.98)}
.wa-icon{width:22px;height:22px;flex-shrink:0}
.section-heading{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);margin:18px 0 10px;padding-left:2px}
.section-heading:first-child{margin-top:0}

/* CAT BADGE COLORS */
.cat-lacteos{background:#e0eaff;color:#2a4aaa}
.cat-proteina{background:#ffe0d8;color:#a03010}
.cat-verdura{background:#d8f0e0;color:#1a5c30}
.cat-fruta{background:#fff0d8;color:#a06000}
.cat-despensa{background:#f0e0ff;color:#6030a0}
.cat-hogar{background:#e0f4f4;color:#1a6060}
.cat-bebida{background:#e0f8ec;color:#1a5040}
.cat-custom{background:#f0f0e8;color:#605040}

/* MANAGER SCREEN */
.screen-overlay{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;background:var(--bg);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.screen-overlay.open{transform:translateX(0)}
.screen-topbar{background:var(--green);padding:13px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(18,38,26,.25);flex-shrink:0}
.back-btn{background:rgba(255,255,255,.18);border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700;cursor:pointer;transition:background .2s;flex-shrink:0}
.back-btn:hover{background:rgba(255,255,255,.3)}
.screen-title{font-family:'Playfair Display',serif;font-size:18px;color:#fff;flex:1}
.add-new-btn{background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.4);border-radius:10px;padding:7px 13px;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:background .2s;white-space:nowrap}
.add-new-btn:hover{background:rgba(255,255,255,.3)}
.screen-body{flex:1;overflow-y:auto;padding:16px 15px}
.mgr-search{width:100%;padding:11px 14px;border-radius:12px;border:2px solid var(--line);background:var(--surface);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--ink);outline:none;transition:border-color .2s;margin-bottom:14px}
.mgr-search:focus{border-color:var(--green)}
.mgr-list{display:flex;flex-direction:column;gap:9px}
.mgr-item{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:11px;padding:12px 13px}
.mgr-emoji{font-size:24px;flex-shrink:0}
.mgr-info{flex:1;min-width:0}
.mgr-name{font-size:14px;font-weight:800}
.mgr-meta{font-size:11px;color:var(--ink-soft);margin-top:1px}
.mgr-price{font-size:15px;font-weight:900;color:var(--green);flex-shrink:0;margin-right:2px}
.mgr-actions{display:flex;gap:6px;flex-shrink:0}
.mgr-edit-btn,.mgr-del-btn{width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s}
.mgr-edit-btn{background:var(--green-light);color:var(--green)}
.mgr-edit-btn:hover{background:#c0e8cc}
.mgr-del-btn{background:var(--red-light);color:var(--red)}
.mgr-del-btn:hover{background:#fad0ca}
.mgr-empty{text-align:center;padding:50px 20px;color:var(--ink-soft)}
.mgr-empty .emoji{font-size:44px;margin-bottom:12px}
.mgr-empty p{font-size:14px;font-weight:600;line-height:1.6}

/* MODAL FORM */
.modal-backdrop{position:fixed;inset:0;background:rgba(18,38,26,.5);z-index:600;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--surface);border-radius:22px 22px 0 0;padding:22px 20px 38px;width:100%;max-width:540px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:93vh;overflow-y:auto}
.modal-backdrop.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--ink);margin-bottom:18px;text-align:center}
.field-group{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.field-label{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft)}
.field-input{padding:11px 13px;border-radius:10px;border:2px solid var(--line);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--ink);outline:none;transition:border-color .2s;background:var(--surface);width:100%}
.field-input:focus{border-color:var(--green)}

/* emoji picker */
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;max-height:120px;overflow-y:auto;border:2px solid var(--line);border-radius:10px;padding:7px}
.emoji-opt{font-size:20px;text-align:center;cursor:pointer;border-radius:7px;padding:4px 2px;transition:background .12s;border:2px solid transparent}
.emoji-opt:hover{background:var(--green-light)}
.emoji-opt.sel{border-color:var(--green);background:var(--green-light)}

/* option grids */
.opts-grid{display:flex;flex-wrap:wrap;gap:7px}
.opt-chip{padding:6px 12px;border-radius:20px;border:2px solid var(--line);font-size:12px;font-weight:700;cursor:pointer;color:var(--ink-soft);transition:all .15s;background:var(--surface)}
.opt-chip.sel{background:var(--green);border-color:var(--green);color:#fff}
.opt-chip.dashed{border-style:dashed}
.opt-chip.dashed:hover,.opt-chip.dashed.sel{border-style:solid}

.modal-save-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--green);color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;cursor:pointer;transition:background .2s,transform .1s;margin-top:8px}
.modal-save-btn:hover{background:var(--green-mid)}
.modal-save-btn:active{transform:scale(.98)}
.modal-cancel-btn{width:100%;padding:11px;border-radius:12px;border:2px solid var(--line);background:transparent;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;color:var(--ink-soft);margin-top:8px;transition:all .2s}
.modal-cancel-btn:hover{border-color:var(--red);color:var(--red)}
.extra-field{margin-top:8px;display:none}
.extra-field.show{display:block}

@media(max-width:380px){.catalog-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="title-wrap">
    <button class="title-btn" id="titleBtn" onclick="toggleMenu()">
      🛒 Mi <span style="font-style:italic;opacity:.85">Mandado</span>
      <span class="chevron">▼</span>
    </button>
    <div class="dropdown" id="mainMenu">
      <div class="dd-item" onclick="openManager()"><span class="dd-icon">📦</span>Añadir productos</div>
      <div class="dd-item" onclick="switchTab('catalogo');closeMenu()"><span class="dd-icon">🛒</span>Ir al catálogo</div>
      <div class="dd-item" onclick="switchTab('carrito');closeMenu()"><span class="dd-icon">🛍️</span>Ver carrito</div>
    </div>
  </div>
  <button class="cart-btn" onclick="switchTab('carrito');closeMenu()">
    🛍️ Carrito <span class="cart-badge" id="cartBadge">0</span>
  </button>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('catalogo')" id="tab-catalogo">📦 Catálogo</div>
  <div class="tab" onclick="switchTab('carrito')"  id="tab-carrito">🛍️ Mi Carrito</div>
</div>

<!-- CATÁLOGO -->
<div class="view active" id="view-catalogo">
  <div class="filter-bar" id="filterBar"></div>
  <div class="catalog-grid" id="catalogGrid"></div>
</div>

<!-- CARRITO -->
<div class="view" id="view-carrito">
  <div id="cartContent"></div>
</div>

<!-- PANTALLA GESTIÓN -->
<div class="screen-overlay" id="managerScreen">
  <div class="screen-topbar">
    <button class="back-btn" onclick="closeManager()">‹</button>
    <div class="screen-title">Mis Productos</div>
    <button class="add-new-btn" onclick="openForm(null)">+ Nuevo</button>
  </div>
  <div class="screen-body">
    <input class="mgr-search" id="mgrSearch" placeholder="🔍  Buscar producto..." oninput="renderManager()">
    <div class="mgr-list" id="mgrList"></div>
  </div>
</div>

<!-- MODAL FORM -->
<div class="modal-backdrop" id="modalBackdrop" onclick="backdropClick(event)">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Nuevo Producto</div>

    <div class="field-group">
      <div class="field-label">Ícono</div>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>

    <div class="field-group">
      <div class="field-label">Nombre del producto</div>
      <input class="field-input" id="fName" type="text" placeholder="ej. Arroz, Frijoles...">
    </div>

    <div class="field-group">
      <div class="field-label">Precio unitario ($)</div>
      <input class="field-input" id="fPrice" type="number" min="0" step="0.5" placeholder="0.00">
    </div>

    <div class="field-group">
      <div class="field-label">Unidad</div>
      <div class="opts-grid" id="unitGrid"></div>
      <input class="field-input extra-field" id="fUnitCustom" type="text" placeholder="Escribe la unidad...">
    </div>

    <div class="field-group">
      <div class="field-label">Categoría</div>
      <div class="opts-grid" id="catGrid"></div>
      <input class="field-input extra-field" id="fCatCustom" type="text" placeholder="Nombre de la nueva categoría...">
    </div>

    <button class="modal-save-btn" onclick="saveProduct()">💾 Guardar producto</button>
    <button class="modal-cancel-btn" onclick="closeForm()">Cancelar</button>
  </div>
</div>

<script>
/* ═══════════════════════════════
   DATA & CONSTANTS
═══════════════════════════════ */
const TRANSPORT = 100;

const BUILT_IN_CATS = [
  {id:'lacteos',  label:'🥛 Lácteos'},
  {id:'proteina', label:'🥩 Proteína'},
  {id:'verdura',  label:'🥦 Verduras'},
  {id:'fruta',    label:'🍎 Frutas'},
  {id:'despensa', label:'🫙 Despensa'},
  {id:'bebida',   label:'🧃 Bebidas'},
  {id:'hogar',    label:'🏠 Hogar'},
];

const CAT_CSS = {lacteos:'cat-lacteos',proteina:'cat-proteina',verdura:'cat-verdura',fruta:'cat-fruta',despensa:'cat-despensa',hogar:'cat-hogar',bebida:'cat-bebida'};

const UNITS = ['pza','kg','lt','bsa','bote','mnj','tapa','tipo','cja','g','ml'];

const EMOJIS = ['🥛','🥚','🥩','🍖','🧀','🍅','🌶️','🧅','🥬','🍌','🍎','🍼','🫒','☕','🧹','💡','🧃','🥤','🌽','🥕','🥦','🥑','🍋','🍇','🧄','🫙','🍞','🥖','🧂','🫗','🍯','🧴','🪣','🧻','🫧','🧼','🐟','🍗','🫑','🧅','🥜','🍚','🫘','🥫','🧆'];

const DEFAULT_PRODUCTS = [
  {id:1, name:'Leche',     emoji:'🥛',unit:'lt',  price:24.4,cat:'lacteos'},
  {id:2, name:'Huevo',     emoji:'🥚',unit:'tapa',price:80,  cat:'proteina'},
  {id:3, name:'Carne',     emoji:'🥩',unit:'tipo',price:100, cat:'proteina'},
  {id:4, name:'Yogurt',    emoji:'🫙',unit:'pza', price:10,  cat:'lacteos'},
  {id:5, name:'Jamón',     emoji:'🍖',unit:'pza', price:35,  cat:'proteina'},
  {id:6, name:'Queso',     emoji:'🧀',unit:'pza', price:15,  cat:'lacteos'},
  {id:7, name:'Jitomate',  emoji:'🍅',unit:'kg',  price:40,  cat:'verdura'},
  {id:8, name:'Chile',     emoji:'🌶️',unit:'pza', price:30,  cat:'verdura'},
  {id:9, name:'Cebolla',   emoji:'🧅',unit:'pza', price:7,   cat:'verdura'},
  {id:10,name:'Espinacas', emoji:'🥬',unit:'mnj', price:25,  cat:'verdura'},

  {id:12,name:'Manzana',   emoji:'🍎',unit:'bsa', price:25,  cat:'fruta'},

  {id:16,name:'Pinol',     emoji:'🧹',unit:'bote',price:30,  cat:'hogar'},
  {id:17,name:'Focos',     emoji:'💡',unit:'pza', price:40,  cat:'hogar'},

];

/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
function ld(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

let products   = ld('mm_products', DEFAULT_PRODUCTS);
let customCats = ld('mm_cats', []);
let cart       = ld('mm_cart', {});
let pqty       = {}; // pending qty per product
let curFilter  = 'all';

// form state
let editId=null, fEmoji='🛒', fUnit='pza', fCat='lacteos', fCustomUnit=false, fCustomCat=false;

function persist(){ sv('mm_products',products); sv('mm_cats',customCats); sv('mm_cart',cart); }

// init pending qty
products.forEach(p=>{ pqty[p.id]=1; });

renderFilterBar(); renderCatalog(); renderCart(); updateBadge();

/* ═══════════════════════════════
   HELPERS
═══════════════════════════════ */
function fmt(n){ return n%1!==0 ? n.toFixed(2) : String(n); }
function fmtMXN(n){ return '$'+(n%1!==0?n.toFixed(2):n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function allCats(){ return [...BUILT_IN_CATS,...customCats]; }
function catLabel(id){
  const c=allCats().find(x=>x.id===id);
  if(c) return c.label.replace(/^\S+\s*/,'').split(' ')[0]; // strip emoji, first word
  return id;
}
function catCSS(id){ return CAT_CSS[id]||'cat-custom'; }

/* ═══════════════════════════════
   MENU
═══════════════════════════════ */
function toggleMenu(){
  document.getElementById('titleBtn').classList.toggle('open');
  document.getElementById('mainMenu').classList.toggle('open');
}
function closeMenu(){
  document.getElementById('titleBtn').classList.remove('open');
  document.getElementById('mainMenu').classList.remove('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.title-wrap')) closeMenu();
});

/* ═══════════════════════════════
   TABS
═══════════════════════════════ */
function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('view-'+t).classList.add('active');
  if(t==='carrito') renderCart();
}

/* ═══════════════════════════════
   FILTER BAR
═══════════════════════════════ */
function renderFilterBar(){
  const bar=document.getElementById('filterBar');
  const cats=allCats();
  bar.innerHTML=`<div class="filter-pill ${curFilter==='all'?'active':''}" onclick="filterCat(this,'all')">🌿 Todo</div>`
    +cats.map(c=>`<div class="filter-pill ${curFilter===c.id?'active':''}" onclick="filterCat(this,'${c.id}')">${c.label}</div>`).join('');
}
function filterCat(el,cat){
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  curFilter=cat;
  renderCatalog();
}

/* ═══════════════════════════════
   CATALOG
═══════════════════════════════ */
function renderCatalog(){
  const grid=document.getElementById('catalogGrid');
  const list=curFilter==='all'?products:products.filter(p=>p.cat===curFilter);
  if(!list.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--ink-soft);font-weight:700;font-size:14px">Sin productos aquí.<br><span style="font-size:12px;opacity:.7">Añade desde el menú ☝️</span></div>`;
    return;
  }
  grid.innerHTML=list.map(p=>{
    const inCart=!!cart[p.id];
    const qty=pqty[p.id]||1;
    return `<div class="product-card${inCart?' in-cart':''}" id="pc-${p.id}">
      <span class="p-cat-badge ${catCSS(p.cat)}">${catLabel(p.cat)}</span>
      <div class="p-emoji">${p.emoji}</div>
      <div class="p-name">${p.name}</div>
      <div class="p-unit">$${fmt(p.price)} / ${p.unit}</div>
      <div class="p-price">$${fmt(p.price*qty)}</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="chgQty(${p.id},-1)">−</button>
        <span class="qty-num" id="pq-${p.id}">${qty}</span>
        <button class="qty-btn" onclick="chgQty(${p.id},1)">+</button>
      </div>
      ${inCart
        ?`<button class="add-btn remove" onclick="removeCart(${p.id})">✕ Quitar</button>`
        :`<button class="add-btn" onclick="addCart(${p.id})">+ Agregar</button>`}
    </div>`;
  }).join('');
}
function chgQty(id,d){
  pqty[id]=Math.max(1,(pqty[id]||1)+d);
  if(cart[id]) cart[id]=pqty[id];
  renderCatalog();renderCart();
}
function addCart(id){cart[id]=pqty[id]||1;persist();updateBadge();renderCatalog();}
function removeCart(id){delete cart[id];persist();updateBadge();renderCatalog();renderCart();}
function updateBadge(){
  const n=Object.keys(cart).length;
  const b=document.getElementById('cartBadge');
  b.textContent=n;b.classList.add('bump');
  setTimeout(()=>b.classList.remove('bump'),300);
}

/* ═══════════════════════════════
   CART
═══════════════════════════════ */
function renderCart(){
  const el=document.getElementById('cartContent');
  const ids=Object.keys(cart).map(Number).filter(id=>products.find(p=>p.id===id));
  if(!ids.length){
    el.innerHTML=`<div class="cart-empty"><div class="emoji">🛒</div><p>Tu carrito está vacío.<br>Ve al catálogo y elige lo que necesitas.</p></div>`;
    return;
  }
  let sub=0;
  const rows=ids.map(id=>{
    const p=products.find(x=>x.id===id);
    const qty=cart[id], line=p.price*qty; sub+=line;
    return `<div class="cart-item">
      <div class="ci-emoji">${p.emoji}</div>
      <div class="ci-info">
        <div class="ci-name">${p.name}</div>
        <div class="ci-unit">$${fmt(p.price)} / ${p.unit}</div>
      </div>
      <div class="ci-right">
        <div class="ci-total">$${fmt(line)}</div>
        <div class="ci-qty-row">
          <button class="ci-qty-btn" onclick="cqty(${id},-1)">−</button>
          <span class="ci-qty-num">${qty}</span>
          <button class="ci-qty-btn" onclick="cqty(${id},1)">+</button>
        </div>
      </div>
      <button class="ci-remove" onclick="removeCart(${id})">🗑️</button>
    </div>`;
  }).join('');
  const grand=sub+TRANSPORT;
  el.innerHTML=`
    <div class="section-heading">Productos (${ids.length})</div>
    <div class="cart-items">${rows}</div>
    <div class="transport-row-cart">
      <div style="font-size:22px">🚌</div>
      <div class="t-info"><div class="t-name">Transporte</div><div class="t-sub">Gasto fijo semanal</div></div>
      <div class="t-price">$${TRANSPORT}</div>
    </div>
    <div class="summary-card" style="margin-top:12px">
      <div class="summary-rows">
        <div class="sum-row"><span>🛒 Subtotal</span><span class="sum-val">$${fmt(sub)}</span></div>
        <div class="sum-row"><span>🚌 Transporte</span><span class="sum-val">$${TRANSPORT}</span></div>
        <div class="sum-row grand"><span class="sum-label">TOTAL</span><span class="sum-val">${fmtMXN(grand)}</span></div>
      </div>
      <button class="wa-btn" onclick="sendWhatsApp()">
        <svg class="wa-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 3C8.82 3 3 8.82 3 16c0 2.36.63 4.6 1.74 6.54L3 29l6.65-1.71A12.94 12.94 0 0016 29c7.18 0 13-5.82 13-13S23.18 3 16 3z" fill="white" fill-opacity=".2"/>
          <path d="M16 5.5A10.5 10.5 0 0 0 7.07 21.4l.28.44-1.18 4.32 4.44-1.16.43.25A10.5 10.5 0 1 0 16 5.5zm5.3 14.94c-.22.63-1.3 1.2-1.8 1.27-.46.06-1.04.09-1.68-.1a15.4 15.4 0 0 1-1.52-.56c-2.67-1.15-4.42-3.83-4.55-4.01-.13-.18-1.07-1.42-1.07-2.71s.68-1.92.92-2.18c.24-.26.52-.33.7-.33l.5.01c.16 0 .38-.06.6.46.22.54.74 1.83.8 1.96.07.13.11.28.02.45-.09.17-.13.28-.26.43-.13.15-.27.34-.39.46-.13.12-.26.26-.11.51.15.25.66 1.09 1.42 1.76.98.87 1.8 1.14 2.05 1.27.25.13.4.11.55-.07.15-.18.63-.73.8-.98.17-.25.34-.21.57-.13.23.08 1.47.69 1.72.82.25.13.42.19.48.3.06.11.06.65-.16 1.27z" fill="white"/>
        </svg>
        Enviar por WhatsApp
      </button>
      <button class="clear-btn" onclick="clearCart()">🗑️ Vaciar carrito</button>
    </div>`;
}
function cqty(id,d){cart[id]=Math.max(1,cart[id]+d);pqty[id]=cart[id];persist();renderCart();updateBadge();}
function clearCart(){
  if(!confirm('¿Vaciar el carrito?'))return;
  cart={};products.forEach(p=>{pqty[p.id]=1;});
  persist();updateBadge();renderCart();renderCatalog();
}

/* ═══════════════════════════════
   WHATSAPP TICKET
═══════════════════════════════ */
function sendWhatsApp(){
  const ids=Object.keys(cart).map(Number).filter(id=>products.find(p=>p.id===id));
  if(!ids.length) return;

  const hoy=new Date();
  const fecha=hoy.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});
  const fechaCap=fecha.charAt(0).toUpperCase()+fecha.slice(1);

  let sub=0;
  const lineas=ids.map(id=>{
    const p=products.find(x=>x.id===id);
    const qty=cart[id];
    const line=p.price*qty;
    sub+=line;
    const precioStr=fmt(p.price).padStart(7,' ');
    const totalStr=fmt(line).padStart(7,' ');
    return `${p.emoji} ${p.name}\n   ${qty} ${p.unit}  ×  $${fmt(p.price)}  =  *$${fmt(line)}*`;
  });

  const grand=sub+TRANSPORT;
  const sep='─────────────────────';

  const msg=
`🛒 *MI MANDADO SEMANAL*
${fechaCap}
${sep}

${lineas.join('\n\n')}

${sep}
🚌 Transporte        *$${TRANSPORT}*
${sep}
🧾 Subtotal          $${fmt(sub)}
${sep}
✅ *TOTAL            $${fmt(grand)}*
${sep}

_Enviado desde Mi Mandado_ 🌿`;

  const url='https://wa.me/?text='+encodeURIComponent(msg);
  window.open(url,'_blank');
}

/* ═══════════════════════════════
   MANAGER SCREEN
═══════════════════════════════ */
function openManager(){
  closeMenu();
  document.getElementById('managerScreen').classList.add('open');
  document.getElementById('mgrSearch').value='';
  renderManager();
}
function closeManager(){document.getElementById('managerScreen').classList.remove('open');}

function renderManager(){
  const q=document.getElementById('mgrSearch').value.trim().toLowerCase();
  const list=document.getElementById('mgrList');
  const filtered=q?products.filter(p=>p.name.toLowerCase().includes(q)||p.cat.includes(q)):products;

  if(!filtered.length){
    list.innerHTML=`<div class="mgr-empty"><div class="emoji">📦</div><p>No se encontraron productos.<br>Toca <strong>+ Nuevo</strong> para agregar.</p></div>`;
    return;
  }

  // group by cat
  const groups={};
  filtered.forEach(p=>{
    (groups[p.cat]=groups[p.cat]||[]).push(p);
  });

  list.innerHTML=Object.entries(groups).map(([cat,items])=>{
    const cl=allCats().find(c=>c.id===cat);
    return `<div class="section-heading">${cl?cl.label:cat}</div>`
      +items.map(p=>`
      <div class="mgr-item">
        <div class="mgr-emoji">${p.emoji}</div>
        <div class="mgr-info">
          <div class="mgr-name">${p.name}</div>
          <div class="mgr-meta">$${fmt(p.price)} por ${p.unit}</div>
        </div>
        <div class="mgr-price">$${fmt(p.price)}</div>
        <div class="mgr-actions">
          <button class="mgr-edit-btn" onclick="openForm(${p.id})">✏️</button>
          <button class="mgr-del-btn"  onclick="delProduct(${p.id})">🗑️</button>
        </div>
      </div>`).join('');
  }).join('');
}

function delProduct(id){
  const p=products.find(x=>x.id===id);
  if(!confirm(`¿Eliminar "${p.name}"?`))return;
  products=products.filter(x=>x.id!==id);
  delete cart[id]; delete pqty[id];
  persist();renderManager();renderCatalog();renderFilterBar();updateBadge();
}

/* ═══════════════════════════════
   FORM MODAL
═══════════════════════════════ */
function openForm(id){
  editId=id;
  const p=id?products.find(x=>x.id===id):null;
  fEmoji      = p?p.emoji:'🛒';
  fUnit       = p?p.unit:'pza';
  fCat        = p?p.cat:'lacteos';
  fCustomUnit = p ? !UNITS.includes(p.unit) : false;
  fCustomCat  = p ? !BUILT_IN_CATS.find(c=>c.id===p.cat) : false;

  document.getElementById('modalTitle').textContent = id?'Editar Producto':'Nuevo Producto';
  document.getElementById('fName').value  = p?p.name:'';
  document.getElementById('fPrice').value = p?p.price:'';
  document.getElementById('fUnitCustom').value = fCustomUnit?fUnit:'';
  document.getElementById('fCatCustom').value  = '';

  buildEmojiGrid(); buildUnitGrid(); buildCatGrid();
  document.getElementById('modalBackdrop').classList.add('open');
}
function closeForm(){document.getElementById('modalBackdrop').classList.remove('open');editId=null;}
function backdropClick(e){if(e.target.id==='modalBackdrop')closeForm();}

/* emoji */
function buildEmojiGrid(){
  document.getElementById('emojiGrid').innerHTML=EMOJIS.map(e=>
    `<div class="emoji-opt${fEmoji===e?' sel':''}" onclick="selEmoji('${e}')">${e}</div>`
  ).join('');
}
function selEmoji(e){
  fEmoji=e;
  document.querySelectorAll('.emoji-opt').forEach(el=>el.classList.toggle('sel',el.textContent===e));
}

/* units */
function buildUnitGrid(){
  document.getElementById('unitGrid').innerHTML=
    UNITS.map(u=>`<div class="opt-chip${!fCustomUnit&&fUnit===u?' sel':''}" onclick="selUnit('${u}')">${u}</div>`).join('')
    +`<div class="opt-chip dashed${fCustomUnit?' sel':''}" onclick="selUnitCustom()">Otra…</div>`;
  const inp=document.getElementById('fUnitCustom');
  inp.classList.toggle('show',fCustomUnit);
  if(fCustomUnit) inp.focus();
}
function selUnit(u){fUnit=u;fCustomUnit=false;buildUnitGrid();}
function selUnitCustom(){fCustomUnit=true;fUnit='';buildUnitGrid();}

/* cats */
function buildCatGrid(){
  document.getElementById('catGrid').innerHTML=
    BUILT_IN_CATS.map(c=>`<div class="opt-chip${!fCustomCat&&fCat===c.id?' sel':''}" onclick="selCat('${c.id}')">${c.label}</div>`).join('')
    +customCats.map(c=>`<div class="opt-chip${!fCustomCat&&fCat===c.id?' sel':''}" onclick="selCat('${c.id}')">${c.label}</div>`).join('')
    +`<div class="opt-chip dashed${fCustomCat?' sel':''}" onclick="selCatCustom()">✚ Nueva categoría</div>`;
  const inp=document.getElementById('fCatCustom');
  inp.classList.toggle('show',fCustomCat);
  if(fCustomCat) inp.focus();
}
function selCat(id){fCat=id;fCustomCat=false;buildCatGrid();}
function selCatCustom(){fCustomCat=true;fCat='';buildCatGrid();}

/* SAVE */
function saveProduct(){
  const name=document.getElementById('fName').value.trim();
  const price=parseFloat(document.getElementById('fPrice').value);
  const unit=fCustomUnit?document.getElementById('fUnitCustom').value.trim():fUnit;
  let cat=fCat;

  if(fCustomCat){
    const raw=document.getElementById('fCatCustom').value.trim();
    if(!raw){alert('Escribe el nombre de la nueva categoría');return;}
    cat=raw.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_áéíóúñ]/g,'');
    if(!customCats.find(c=>c.id===cat)){
      // pick a random emoji for custom cat
      const catEmojis=['🏷️','🧺','🪴','🎯','⭐','🔖'];
      const rnd=catEmojis[Math.floor(Math.random()*catEmojis.length)];
      customCats.push({id:cat,label:`${rnd} ${raw}`});
    }
  }

  if(!name){alert('Escribe el nombre del producto');return;}
  if(isNaN(price)||price<=0){alert('Escribe un precio válido');return;}
  if(!unit){alert('Selecciona o escribe una unidad');return;}
  if(!cat){alert('Selecciona o escribe una categoría');return;}

  if(editId){
    const i=products.findIndex(p=>p.id===editId);
    products[i]={...products[i],name,price,unit,cat,emoji:fEmoji};
  } else {
    const nid=Date.now();
    products.push({id:nid,name,price,unit,cat,emoji:fEmoji});
    pqty[nid]=1;
  }

  persist();
  renderFilterBar(); renderCatalog(); renderManager();
  closeForm();
}
</script>
